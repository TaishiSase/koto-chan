<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>今日のことちゃん</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
</head>
<body>

  <!-- 認証画面 -->
  <div id="authScreen" class="auth-screen active">
    <div class="auth-bg">
      <div class="auth-blob blob1"></div>
      <div class="auth-blob blob2"></div>
      <div class="auth-blob blob3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-icon">📸</div>
      <h1 class="auth-title">今日のことちゃん</h1>
      <p class="auth-sub">娘の成長アルバム</p>
      <div class="password-wrap">
        <input type="password" id="passwordInput" placeholder="パスワードを入力"
               class="password-input" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePasswordVisibility()" id="eyeIcon">👁</button>
      </div>
      <button onclick="authenticate()" class="btn-login">ログイン</button>
      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="mainApp" class="main-app">

    <!-- ヘッダー -->
    <header class="app-header">
      <h1 class="header-title">
        <span class="header-icon">📸</span>
        今日のことちゃん
      </h1>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </header>

    <!-- 今日のページ -->
    <div id="todayPage" class="page">
      <div class="today-wrap">
        <div id="todayPhoto" class="today-hero">
          <p class="no-photo">📷<br>未投稿です</p>
        </div>
        <div id="todayInfo" class="today-info"></div>
      </div>
    </div>

    <!-- 投稿ページ -->
    <div id="postPage" class="page">
      <div class="page-inner">
        <h2 class="page-title">写真を投稿する</h2>
        <form id="postForm" class="post-form">

          <div class="form-group">
            <label class="form-label">写真を選択</label>
            <label class="file-drop" id="fileDrop">
              <input type="file" id="photoInput" accept="image/jpeg,image/png,image/heic,.heic" required>
              <div id="fileDropContent">
                <span class="file-icon">🖼️</span>
                <span class="file-text">タップして写真を選択</span>
                <span class="file-sub">JPG・PNG・HEIC 対応</span>
              </div>
              <div id="photoPreview" class="photo-preview" style="display:none;">
                <img id="previewImage" src="" alt="プレビュー">
                <span class="preview-change">タップして変更</span>
              </div>
            </label>
          </div>

          <div class="form-group">
            <label class="form-label" for="commentInput">コメント</label>
            <textarea id="commentInput" maxlength="30" rows="3"
                      placeholder="今日のことちゃんのひとことを…" required></textarea>
            <p class="char-count"><span id="charCount">0</span> / 30</p>
          </div>

          <div id="overwriteWarning" class="overwrite-warning" style="display:none;">
            ⚠️ 今日は既に投稿があります。上書きされます。
          </div>

          <button type="submit" class="btn-post">投稿する ✨</button>
          <p class="post-success" id="postSuccess" style="display:none;">✅ 今日のことちゃんを更新しました！</p>
          <p class="post-error" id="postError"></p>

        </form>
      </div>
    </div>

    <!-- 一覧ページ -->
    <div id="listPage" class="page">
      <div class="list-header">
        <h2 class="page-title">成長アルバム</h2>
        <p class="list-hint">← スワイプで過去へ →</p>
      </div>
      <div id="timelineContainer" class="timeline-container">
        <div id="photoTimeline" class="photo-timeline"></div>
      </div>
    </div>

    <!-- お気に入りページ -->
    <div id="favoritesPage" class="page">
      <div class="list-header">
        <h2 class="page-title">⭐ お気に入り</h2>
      </div>
      <div id="favoritesList"></div>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
      <button class="bnav-btn" data-page="today" onclick="goToPage('today')">
        <span class="bnav-icon">🏠</span>
        <span class="bnav-label">今日</span>
      </button>
      <button class="bnav-btn" data-page="post" onclick="goToPage('post')">
        <span class="bnav-icon post-icon">＋</span>
        <span class="bnav-label">投稿</span>
      </button>
      <button class="bnav-btn" data-page="list" onclick="goToPage('list')">
        <span class="bnav-icon">📚</span>
        <span class="bnav-label">一覧</span>
      </button>
      <button class="bnav-btn" data-page="favorites" onclick="goToPage('favorites')">
        <span class="bnav-icon">⭐</span>
        <span class="bnav-label">お気に入り</span>
      </button>
    </nav>

  </div><!-- /mainApp -->

  <!-- 写真ポップアップ -->
  <div id="photoPopup" class="photo-popup">
    <div class="popup-inner">
      <button class="popup-close" onclick="closePhotoPopup()">✕</button>
      <img id="popupImage" src="" alt="拡大写真">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
