<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のことちゃん</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="screen active">
      <div class="auth-container">
        <h1>今日のことちゃん</h1>
        <p class="subtitle">娘の成長アルバム</p>
        <input type="password" id="passwordInput" placeholder="パスワードを入力" class="password-input">
        <button onclick="authenticate()" class="btn btn-primary">ログイン</button>
        <p class="error-msg" id="authError"></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="screen">
      <nav class="navbar">
        <h1 class="nav-title">今日のことちゃん</h1>
        <div class="nav-buttons">
          <button class="nav-btn" onclick="goToPage('today')">今日</button>
          <button class="nav-btn" onclick="goToPage('post')">投稿</button>
          <button class="nav-btn" onclick="goToPage('list')">一覧</button>
          <button class="nav-btn" onclick="goToPage('favorites')">📌 お気に入り</button>
          <button class="nav-btn logout" onclick="logout()">ログアウト</button>
        </div>
      </nav>

      <!-- Today Page -->
      <div id="todayPage" class="page active">
        <div class="page-content">
          <h2>今日の写真</h2>
          <div id="todayPhoto" class="today-photo-container">
            <p class="no-photo">未投稿です</p>
          </div>
          <div id="todayInfo" style="margin-top: 20px; text-align: center;"></div>
        </div>
      </div>

      <!-- Post Page -->
      <div id="postPage" class="page">
        <div class="page-content">
          <h2>写真を投稿する</h2>
          <form id="postForm" class="post-form">
            <div class="form-group">
              <label for="photoInput">写真を選択</label>
              <input type="file" id="photoInput" accept="image/jpeg,image/png,image/heic" required>
              <p class="help-text">JPG, PNG, HEIC に対応しています</p>
            </div>

            <div class="form-group">
              <label for="commentInput">コメント（30文字まで）</label>
              <textarea id="commentInput" maxlength="30" rows="3" placeholder="今日のコメントを入力"></textarea>
              <p class="char-count"><span id="charCount">0</span>/30</p>
            </div>

            <div id="overwriteWarning" style="display: none;" class="warning">
              ⚠️ 今日既に投稿があります。上書きされます。
            </div>

            <button type="submit" class="btn btn-primary">投稿する</button>
            <p class="success-msg" id="postSuccess" style="display: none;">今日のことちゃんを更新しました</p>
            <p class="error-msg" id="postError"></p>
          </form>
        </div>
      </div>

      <!-- List Page -->
      <div id="listPage" class="page">
        <div class="page-content">
          <h2>成長アルバム</h2>
          <div id="timelineContainer" class="timeline-container">
            <div id="photoTimeline" class="photo-timeline"></div>
          </div>
        </div>
      </div>

      <!-- Favorites Page -->
      <div id="favoritesPage" class="page">
        <div class="page-content">
          <h2>📌 お気に入り</h2>
          <div id="favoritesList" class="favorites-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Photo Popup -->
  <div id="photoPopup" class="photo-popup">
    <div class="popup-content">
      <span class="popup-close" onclick="closePhotoPopup()">&times;</span>
      <img id="popupImage" src="" alt="">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
